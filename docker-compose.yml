services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: ./app
    environment:
      DATABASE_URL: postgresql://taskuser:${DB_PASSWORD}@db:5432/taskdb
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
