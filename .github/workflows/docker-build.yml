name: Docker Build

on: 
  push:
    branches: [main] 
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: echo "DB_PASSWORD=testpassword123" > .env

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Test health endpoint
        run: |
          curl --fail http://localhost/health

      - name: Test task creation
        run: |
          curl --fail -X POST http://localhost/tasks \
            -H "Content-Type: application/json" \
            -d '{"title": "CI test task"}'

      - name: Test task retrieval
        run: curl --fail http://localhost/tasks

      - name: Stop services
        run: docker compose down

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dockerized-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dockerized-app:${{ github.sha }}
